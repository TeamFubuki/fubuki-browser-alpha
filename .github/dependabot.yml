version: 2

updates:
  # UI dependencies (pnpm via npm ecosystem)
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "deps(ui)"
      prefix-development: "deps-dev(ui)"
      include: "scope"
    labels:
      - "dependencies"
      - "ui"
    groups:
      ui-minor-patch:
        dependency-type: "production"
        patterns: ["*"]
        update-types: ["minor", "patch"]
      ui-dev-minor-patch:
        dependency-type: "development"
        patterns: ["*"]
        update-types: ["minor", "patch"]
      ui-major:
        patterns: ["*"]
        update-types: ["major"]

  # Rust dependencies (Cargo)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(rust)"
      prefix-development: "deps-dev(rust)"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
    groups:
      rust-minor-patch:
        dependency-type: "production"
        patterns: ["*"]
        update-types: ["minor", "patch"]
      rust-dev-minor-patch:
        dependency-type: "development"
        patterns: ["*"]
        update-types: ["minor", "patch"]
      rust-major:
        patterns: ["*"]
        update-types: ["major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns: ["*"]
