name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "11.9.0"
  NODE_VERSION: "24"

jobs:
  shell-check:
    name: Shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check shell scripts
        run: |
          shopt -s nullglob
          files=(scripts/*.sh)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi

          shellcheck "${files[@]}"

  cpp-static-analysis:
    name: C++ static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Collect C++ source files
        run: |
          find native -type f \( \
            -name '*.cc' -o \
            -name '*.cpp' -o \
            -name '*.cxx' -o \
            -name '*.h' -o \
            -name '*.hh' -o \
            -name '*.hpp' -o \
            -name '*.hxx' \
          \) \
          ! -path '*/build/*' \
          ! -path '*/cmake-build-*/*' \
          ! -path '*/third_party/*' \
          ! -path '*/vendor/*' \
          > cpp-files.txt

          if [ ! -s cpp-files.txt ]; then
            echo "No native C++ source files found."
            exit 0
          fi

          echo "Files checked by cppcheck:"
          cat cpp-files.txt

      - name: Run cppcheck
        run: |
          cppcheck \
            --language=c++ \
            --std=c++20 \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress=syntaxError:native/src/browser/BrowserWindow.h \
            --suppress=unusedStructMember \
            --file-list=cpp-files.txt

  ui-check:
    name: UI typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build UI
        run: pnpm run build

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  repo-policy-check:
    name: Repository policy check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure no vendored CEF binaries
        run: |
          if [ -d third_party/cef ]; then
            echo "third_party/cef must not be committed."
            exit 1
          fi

      - name: Ensure no generated outputs are committed
        run: |
          forbidden_paths="
          ui/dist
          native/build
          native/cmake-build-debug
          native/cmake-build-release
          .cache
          "

          failed=0

          for path in $forbidden_paths; do
            if [ -e "$path" ]; then
              echo "Generated output must not be committed: $path"
              failed=1
            fi
          done

          exit "$failed"

      - name: Check executable shell scripts
        run: |
          shopt -s nullglob
          files=(scripts/*.sh)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi

          failed=0

          for file in "${files[@]}"; do
            if [ ! -x "$file" ]; then
              echo "Script is not executable: $file"
              failed=1
            fi
          done

          exit "$failed"

  final-check:
    name: Final check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - shell-check
      - cpp-static-analysis
      - ui-check
      - repo-policy-check

    steps:
      - name: Done
        run: echo "CI passed."
