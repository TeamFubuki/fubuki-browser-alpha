name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "11"
  NODE_VERSION: "22"

jobs:
  ui-check:
    name: UI check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck & Build
        run: pnpm run build

      - name: Tests
        run: pnpm run test

  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

  rust-audit:
    name: Rust security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit --deny warnings

  rust-deny:
    name: Rust license & advisory deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Deny check
        run: cargo deny --all-features check

  rust-doc:
    name: Rust docs build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}

      - name: Build documentation
        run: cargo doc --no-deps --workspace --document-private-items

  ui-audit:
    name: UI dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  native-test:
    name: Native test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S native/tests -B native/tests/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build native/tests/build --parallel $(nproc)

      - name: Run tests
        run: cd native/tests/build && ctest --output-on-failure

  repository-check:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Merge conflict markers
        run: |
          if grep -RIn \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=build \
            --exclude-dir=target \
            --exclude-dir=third_party \
            --exclude='pnpm-lock.yaml' \
            -E '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo "::error::Merge conflict markers found."
            exit 1
          fi

      - name: Large files (> 20 MB)
        run: |
          failed=0
          while IFS= read -r file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt $((20 * 1024 * 1024)) ]; then
              echo "::warning::Large file: $file ($size bytes)"
              failed=1
            fi
          done < <(
            find . -type f \
              ! -path './.git/*' \
              ! -path './ui/node_modules/*' \
              ! -path './node_modules/*' \
              ! -path './third_party/*' \
              ! -path './native/build/*' \
              ! -path './target/*'
          )
          exit "$failed"
