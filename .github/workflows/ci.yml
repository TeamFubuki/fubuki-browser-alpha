name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "11"
  NODE_VERSION: "22"
  # Run the heavy macOS-native build only when merging into main or manual dispatch.
  RUN_MACOS: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

jobs:
  ui-check:
    name: UI check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck & Build
        run: pnpm run build

      - name: Tests
        run: pnpm run test

  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

  rust-ffi:
    name: Rust FFI build (frost-ffi staticlib)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release static library
        run: cargo build -p frost-ffi --release

      - name: Verify static archive produced
        run: test -f target/release/libfrost_ffi.a

  rust-audit:
    name: Rust security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit --deny warnings

  rust-deny:
    name: Rust license & advisory deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Deny check
        run: cargo deny --all-features check

  rust-doc:
    name: Rust docs build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}

      - name: Build documentation
        run: cargo doc --no-deps --workspace --document-private-items

  ui-audit:
    name: UI dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  native-test:
    name: Native unit test (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -S native/tests -B native/tests/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build native/tests/build --parallel $(nproc)

      - name: Run tests
        run: cd native/tests/build && ctest --output-on-failure

  macos-build:
    name: macOS native build (CEF)
    runs-on: macos-15
    timeout-minutes: 60
    # Heavy native build: only on main merge or manual dispatch, not per-PR.
    if: ${{ env.RUN_MACOS == 'true' }}
    env:
      BUILD_TYPE: release
      CEF_ROOT: ${{ github.workspace }}/third_party/cef
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install build tools
        run: brew install cmake llvm

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-macos-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache CEF binaries & archive
        id: cef-cache
        uses: actions/cache@v5
        with:
          path: |
            .cache/cef
            third_party/cef
          key: cef-${{ runner.os }}-${{ hashFiles('scripts/fetch_cef.sh') }}

      - name: Fetch CEF
        run: make cef

      - name: Install UI dependencies & build
        run: |
          cd ui
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configure native build
        run: make configure

      - name: Build native app (incl. frost-ffi)
        run: make native

      - name: Run native unit tests
        run: make test-native

      - name: Verify app bundle
        run: test -d "native/build/Fubuki Browser Alpha.app"

  repository-check:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Merge conflict markers
        run: |
          if grep -RIn \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=build \
            --exclude-dir=target \
            --exclude-dir=third_party \
            --exclude-dir=.cache \
            --exclude='pnpm-lock.yaml' \
            -E '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo "::error::Merge conflict markers found."
            exit 1
          fi

      - name: Large files (> 20 MB)
        run: |
          failed=0
          while IFS= read -r file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt $((20 * 1024 * 1024)) ]; then
              echo "::warning::Large file: $file ($size bytes)"
              failed=1
            fi
          done < <(
            find . -type f \
              ! -path './.git/*' \
              ! -path './ui/node_modules/*' \
              ! -path './node_modules/*' \
              ! -path './third_party/*' \
              ! -path './native/build/*' \
              ! -path './native/tests/build/*' \
              ! -path './target/*' \
              ! -path './.cache/*' \
              ! -name '.DS_Store'
          )
          exit "$failed"
