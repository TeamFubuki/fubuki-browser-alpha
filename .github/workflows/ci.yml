name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "11.9.0"

jobs:
  shell-check:
    name: Shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check shell scripts
        run: |
          shellcheck scripts/*.sh

  cpp-static-analysis:
    name: C++ static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck strictly
        run: |
          find native -type f \( \
            -name '*.c' -o \
            -name '*.cc' -o \
            -name '*.cpp' -o \
            -name '*.cxx' -o \
            -name '*.mm' -o \
            -name '*.m' -o \
            -name '*.h' -o \
            -name '*.hh' -o \
            -name '*.hpp' -o \
            -name '*.hxx' \
          \) > cpp-files.txt

          if [ ! -s cpp-files.txt ]; then
            echo "No native source files found."
            exit 1
          fi

          cppcheck \
            --std=c++20 \
            --enable=warning,performance,portability,style \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --file-list=cpp-files.txt

  ui-check:
    name: UI typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build UI
        run: pnpm run build

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  repo-policy-check:
    name: Repository policy check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure no vendored CEF binaries
        run: |
          if [ -d third_party/cef ]; then
            echo "third_party/cef must not be committed."
            exit 1
          fi

      - name: Ensure no build outputs are committed
        run: |
          forbidden_paths="
          ui/dist
          native/build
          .cache
          "

          for path in $forbidden_paths; do
            if [ -e "$path" ]; then
              echo "Generated output must not be committed: $path"
              exit 1
            fi
          done

      - name: Check executable scripts
        run: |
          failed=0

          for file in scripts/*.sh; do
            if [ ! -x "$file" ]; then
              echo "Script is not executable: $file"
              failed=1
            fi
          done

          exit "$failed"

  final-check:
    name: Final check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - shell-check
      - cpp-static-analysis
      - ui-check
      - repo-policy-check

    steps:
      - name: Done
        run: echo "CI passed."
