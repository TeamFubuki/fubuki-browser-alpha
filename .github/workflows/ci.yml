name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "11.9.0"
  NODE_VERSION: "24"

jobs:
  ui-check:
    name: UI check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            pnpm run lint
          else
            echo "No lint script. Skipping."
          fi

      - name: Format check
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['format:check'] ? 0 : 1)"; then
            pnpm run format:check
          else
            echo "No format:check script. Skipping."
          fi

      - name: Typecheck & Build
        run: pnpm run build

      - name: Tests
        run: pnpm run test

  native-test:
    name: Native test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Configure
        run: cmake -S native/tests -B native/tests/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build native/tests/build --parallel $(nproc)

      - name: Run tests
        run: cd native/tests/build && ctest --output-on-failure

  repository-check:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Merge conflict markers
        run: |
          if grep -RIn \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=build \
            --exclude-dir=third_party \
            --exclude='pnpm-lock.yaml' \
            -E '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo "Merge conflict markers found."
            exit 1
          fi

      - name: Large files (> 20 MB)
        run: |
          failed=0
          while IFS= read -r file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt $((20 * 1024 * 1024)) ]; then
              echo "Large file: $file ($size bytes)"
              failed=1
            fi
          done < <(
            find . -type f \
              ! -path './.git/*' \
              ! -path './ui/node_modules/*' \
              ! -path './node_modules/*' \
              ! -path './third_party/*' \
              ! -path './native/build/*'
          )
          exit "$failed"
